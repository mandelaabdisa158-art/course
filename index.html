<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff0055;
            --secondary: #7000ff;
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 20% 30%, #1a0b2e 0%, #050505 100%);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary);
            cursor: pointer;
            letter-spacing: 2px;
        }

        .nav-links {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .nav-links a {
            color: #ccc;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .page {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            text-align: center;
        }

        h1 {
            font-size: 2.8rem;
            text-transform: uppercase;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            animation: fadeInUp 0.8s ease-out;
        }

        .status-pill {
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            border: 1px solid var(--primary);
            margin-bottom: 20px;
            display: inline-block;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1100px;
            margin-top: 30px;
        }

        .cat-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.4s;
            animation: fadeInUp 0.8s ease-out both;
        }

        .cat-card:hover {
            border-color: var(--primary);
            transform: translateY(-8px);
            background: rgba(255, 0, 85, 0.1);
            box-shadow: 0 15px 30px rgba(255, 0, 85, 0.2);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: #111;
            margin: 10% auto;
            padding: 30px;
            border: 1px solid var(--primary);
            border-radius: 24px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 0 50px rgba(255, 0, 85, 0.2);
        }

        .modal input {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            border: 1px solid #333;
            border-radius: 12px;
            background: #000;
            color: white;
            font-size: 1rem;
            text-align: center;
        }

        .watch-btn {
            display: inline-block;
            padding: 14px 25px;
            width: 100%;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            margin-top: 10px;
            transition: 0.3s;
        }

        .watch-btn:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        .upgrade-banner {
            background: linear-gradient(90deg, #111, #222);
            border: 1px solid gold;
            padding: 20px;
            border-radius: 15px;
            margin-top: 30px;
            max-width: 600px;
            display: none;
        }

        .tg-link {
            color: #0088cc;
            font-weight: bold;
            text-decoration: none;
            display: block;
            margin-top: 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            margin-top: 30px;
        }

        .box {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            text-align: left;
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

        // ──────────────────────────────────────────────────────────────
        // SHA-256 hashing using Web Crypto API (built into all browsers)
        // ──────────────────────────────────────────────────────────────
        async function hashString(str) {
            const buffer = await crypto.subtle.digest(
                'SHA-256',
                new TextEncoder().encode(str)
            );
            return Array.from(new Uint8Array(buffer))
                .map(b => b.toString(16).padStart(2, '0'))
                .join('');
        }

        async function validateCode() {
            const rawCode = document.getElementById('code-input').value.trim().toLowerCase();
            if (!rawCode) { alert("Please enter a code."); return; }

            const btn = document.getElementById('unlock-btn');
            btn.innerHTML = `<span class="loading-spinner"></span> Verifying...`;
            btn.disabled = true;

            const used = JSON.parse(localStorage.getItem('used_codes') || '[]');

            try {
                const hashed = await hashString(rawCode);

                if (used.includes(hashed)) {
                    alert("This code has already been used!");
                    btn.innerHTML = "UNLOCK NOW";
                    btn.disabled = false;
                    return;
                }

                let type = "";
                if (premiumHashes.has(hashed)) type = "premium";
                else if (trialHashes.has(hashed)) type = "trial";
                else {
                    alert("Invalid Code! Contact @T4t4t2 for help.");
                    btn.innerHTML = "UNLOCK NOW";
                    btn.disabled = false;
                    return;
                }

                localStorage.setItem('marsh_user_type', type);
                used.push(hashed);
                localStorage.setItem('used_codes', JSON.stringify(used));

                document.getElementById('code-modal').style.display = 'none';
                document.getElementById('surprise-modal').style.display = 'block';

            } catch (e) {
                alert("Something went wrong. Please try again.");
            }

            btn.innerHTML = "UNLOCK NOW";
            btn.disabled = false;
        }
