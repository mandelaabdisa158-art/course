<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X_Marsh | Multi-Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #ff0055; --secondary: #7000ff; --bg: #050505; --card-bg: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg); background-image: radial-gradient(circle at 20% 30%, #1a0b2e 0%, #050505 100%); color: white; min-height: 100vh; }
        
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-size: 1.8rem; font-weight: 800; color: var(--primary); cursor: pointer; letter-spacing: 2px; }
        
        .page { display: flex; flex-direction: column; align-items: center; padding: 60px 20px; text-align: center; }
        h1 { font-size: 3rem; text-transform: uppercase; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        
        /* Category Selection Styles */
        .category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; margin-top: 40px; }
        .cat-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); padding: 50px 20px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        .cat-card:hover { border-color: var(--primary); transform: translateY(-5px); background: rgba(255, 0, 85, 0.05); }
        .cat-card h2 { font-size: 1.2rem; letter-spacing: 2px; }

        /* Course Video Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; width: 100%; max-width: 1200px; margin-top: 40px; }
        .box { background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 35px; transition: 0.4s; }
        .module-label { color: var(--primary); font-weight: 800; font-size: 0.75rem; letter-spacing: 3px; margin-bottom: 10px; }
        
        .watch-btn, .login-btn { display: inline-block; padding: 14px 25px; width: 100%; background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; text-decoration: none; transition: 0.3s; margin-top: 15px; }
        .locked { background: #222; opacity: 0.6; cursor: not-allowed; border: 1px solid #444; }
        .back-btn { background: none; border: 1px solid #555; color: #ccc; padding: 8px 20px; border-radius: 8px; cursor: pointer; margin-bottom: 30px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo" onclick="location.reload()">X_Marsh</div>
        <button id="auth-btn" class="login-btn" style="width:auto; margin:0;" onclick="handleAuth()">Login</button>
    </nav>

    <section class="page">
        <h1 id="main-title">Academy Dashboard</h1>
        <p id="status-label" style="color: var(--primary); font-weight: 600;">Loading Access...</p>

        <div id="content-area" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
            </div>
    </section>

    <script>
        const SUPABASE_URL = 'https://vndrvffgpzxffufuljbi.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZuZHJ2ZmZncHp4ZmZ1ZnVsamJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MDI3MzAsImV4cCI6MjA5MTA3ODczMH0.Dbs7eb5vdDygs-QsG_Y_-KRQxlLWTe3_t42hdGcLKTY';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const courseData = {
            editing: {
                title: "Video Editing",
                dbField: "has_editing",
                videos: [
                    { name: "Intro to Capcut", url: "https://youtu.be/SZPswpuvyl4", free: true },
                    { name: "Green Screen Secrets", url: "https://youtu.be/w-742mxKkNU", free: true },
                    { name: "Pro Effects (Premium)", url: "https://youtu.be/locked", free: false },
                    { name: "Viral Export (Premium)", url: "https://youtu.be/locked", free: false }
                ]
            },
            trading: {
                title: "Trading Strategy",
                dbField: "has_trading",
                videos: [
                    { name: "Market Basics", url: "https://youtu.be/basics", free: true },
                    { name: "Candlestick 101", url: "https://youtu.be/candles", free: true },
                    { name: "Pro Analysis", url: "https://youtu.be/pro", free: false }
                ]
            },
            ai: {
                title: "AI Mastery",
                dbField: "has_ai",
                videos: [
                    { name: "Prompt Engineering", url: "https://youtu.be/prompt", free: true },
                    { name: "AI Video Tools", url: "https://youtu.be/aitools", free: true },
                    { name: "Full Automation", url: "https://youtu.be/autopro", free: false }
                ]
            },
            youtube: {
                title: "YT Automation",
                dbField: "has_youtube",
                videos: [
                    { name: "Niche Research", url: "https://youtu.be/niche", free: true },
                    { name: "Script Workflow", url: "https://youtu.be/script", free: true },
                    { name: "Scale to $10k", url: "https://youtu.be/scale", free: false }
                ]
            }
        };

        let userProfile = null;

        async function handleAuth() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                await supabaseClient.auth.signOut();
                location.reload();
            } else {
                const email = prompt("Enter email for secure magic link:");
                if (!email) return;
                const { error } = await supabaseClient.auth.signInWithOtp({ email });
                if (error) alert(error.message);
                else alert("Check your email for the login link!");
            }
        }

        async function checkUser() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                document.getElementById('auth-btn').innerText = "Logout";
                let { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', user.id).single();
                if (!profile) {
                    const newProfile = { id: user.id, email: user.email, has_editing: false, has_trading: false, has_ai: false, has_youtube: false };
                    await supabaseClient.from('profiles').insert([newProfile]);
                    userProfile = newProfile;
                } else {
                    userProfile = profile;
                }
            }
            showHome();
        }

        function showHome() {
            document.getElementById('main-title').innerText = "Academy Dashboard";
            document.getElementById('status-label').innerText = userProfile ? `Logged in as: ${userProfile.email}` : "Login for full access";
            
            const area = document.getElementById('content-area');
            area.innerHTML = `
                <div class="category-grid">
                    <div class="cat-card" onclick="showCourse('editing')"><h2>VIDEO EDITING</h2></div>
                    <div class="cat-card" onclick="showCourse('trading')"><h2>TRADING</h2></div>
                    <div class="cat-card" onclick="showCourse('ai')"><h2>AI COURSE</h2></div>
                    <div class="cat-card" onclick="showCourse('youtube')"><h2>YT AUTOMATION</h2></div>
                </div>
            `;
        }

        function showCourse(key) {
            const course = courseData[key];
            const hasAccess = userProfile ? userProfile[course.dbField] : false;
            
            document.getElementById('main-title').innerText = course.title;
            document.getElementById('status-label').innerText = hasAccess ? "💎 PREMIUM UNLOCKED" : "🆓 FREE PREVIEW";

            const area = document.getElementById('content-area');
            let html = `<button class="back-btn" onclick="showHome()">⬅ Back to Courses</button> <div class="grid">`;
            
            html += course.videos.map((v, i) => {
                const locked = !v.free && !hasAccess;
                return `
                    <div class="box">
                        <div class="module-label">${locked ? "🔒 LOCKED" : "MODULE 0" + (i+1)}</div>
                        <h3>${locked ? "Premium Members Only" : v.name}</h3>
                        ${locked 
                            ? `<div class="watch-btn locked">PAY TO UNLOCK</div>` 
                            : `<a href="${v.url}" target="_blank" class="watch-btn">WATCH NOW</a>`}
                    </div>
                `;
            }).join('');
            
            html += `</div>`;
            area.innerHTML = html;
        }

        checkUser();
    </script>
</body>
</html>
