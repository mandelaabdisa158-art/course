<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X_Marsh | Pro Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff0055; --secondary: #7000ff; --bg: #050505; --card-bg: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg); background-image: radial-gradient(circle at 20% 30%, #1a0b2e 0%, #050505 100%); color: white; min-height: 100vh; }
        
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-size: 1.8rem; font-weight: 800; color: var(--primary); cursor: pointer; letter-spacing: 2px; }
        .user-section { display: flex; align-items: center; gap: 15px; }
        #user-photo { width: 35px; height: 35px; border-radius: 50%; display: none; border: 2px solid var(--primary); object-fit: cover; }

        .page { display: flex; flex-direction: column; align-items: center; padding: 60px 20px; }
        h1 { font-size: 3rem; text-transform: uppercase; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; text-align: center; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; width: 100%; max-width: 1200px; margin-top: 40px; }
        .box { background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 35px; text-align: center; backdrop-filter: blur(10px); transition: 0.4s; display: flex; flex-direction: column; justify-content: space-between; }
        .module-label { color: var(--primary); font-weight: 800; font-size: 0.75rem; letter-spacing: 3px; }
        h3 { margin: 15px 0; font-size: 1.4rem; min-height: 50px; }
        
        .watch-btn, .login-btn { display: inline-block; padding: 14px 25px; width: 100%; background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; text-decoration: none; transition: 0.3s; }
        .watch-btn:hover { filter: brightness(1.2); transform: translateY(-2px); }
        .locked-btn { background: #222; border: 1px solid #444; cursor: not-allowed; opacity: 0.7; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">X_Marsh</div>
        <div class="user-section">
            <img id="user-photo" src="" alt="Profile">
            <button id="auth-btn" class="login-btn" style="margin:0; width: auto; padding: 8px 15px;">Login</button>
        </div>
    </nav>

    <section id="main-page" class="page">
        <h1 id="welcome-text">Course Dashboard</h1>
        <p id="status-label" style="margin-bottom: 20px; color: #ff0055; font-weight: 600;">Please Login to Access Courses</p>
        <div class="grid" id="courseGrid"></div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Your exact config from the screenshot
        const firebaseConfig = {
            apiKey: "AIzaSyAGTr0n5w9AtmWvwI2birctlGeFZB0OSxY",
            authDomain: "x-marsh-academy.firebaseapp.com",
            projectId: "x-marsh-academy",
            storageBucket: "x-marsh-academy.firebasestorage.app",
            messagingSenderId: "488318989587",
            appId: "1:488318989587:web:e1cac3089b135d2aff16e6",
            measurementId: "G-6MQ58VSYX4"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const myCourses = [
            { name: "Introduction To Capcut", url: "https://youtu.be/SZPswpuvyl4" },
            { name: "Text & Green Screen", url: "https://youtu.be/w-742mxKkNU" },
            { name: "Advanced Transitions (Premium)", url: "https://youtu.be/ExampleLink1" },
            { name: "Color Grading Masterclass (Premium)", url: "https://youtu.be/ExampleLink2" },
            { name: "Viral Storytelling (Premium)", url: "https://youtu.be/ExampleLink3" },
            { name: "Client Hunting (Premium)", url: "https://youtu.be/ExampleLink4" }
        ];

        const authBtn = document.getElementById('auth-btn');
        const userPhoto = document.getElementById('user-photo');
        const statusLabel = document.getElementById('status-label');
        const grid = document.getElementById('courseGrid');

        authBtn.onclick = () => {
            if(auth.currentUser) { signOut(auth); } 
            else { signInWithPopup(auth, provider).catch(err => alert("Error: Make sure Google Login is enabled in Firebase!")); }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                authBtn.innerText = "Logout";
                userPhoto.src = user.photoURL;
                userPhoto.style.display = "block";
                
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);
                
                let isPremium = false;
                if (userSnap.exists()) {
                    isPremium = userSnap.data().isPremium;
                } else {
                    await setDoc(userRef, { email: user.email, isPremium: false });
                }

                statusLabel.innerText = isPremium ? "💎 PREMIUM ACCOUNT ACTIVE" : "🆓 FREE ACCOUNT (Contact @t4t4t2 to Upgrade)";
                statusLabel.style.color = isPremium ? "#00ff88" : "#aaa";
                renderCourses(isPremium);
            } else {
                authBtn.innerText = "Login with Google";
                userPhoto.style.display = "none";
                statusLabel.innerText = "Login to see your status";
                statusLabel.style.color = "#ff0055";
                renderCourses(false);
            }
        });

        function renderCourses(isPremium) {
            grid.innerHTML = '';
            myCourses.forEach((course, index) => {
                const isLocked = index >= 2 && !isPremium;
                const box = document.createElement('div');
                box.className = 'box';
                const num = (index + 1).toString().padStart(2, '0');

                box.innerHTML = `
                    <div>
                        <div class="module-label">${isLocked ? 'LOCKED' : 'MODULE ' + num}</div>
                        <h3>${isLocked ? "Premium Access Required" : course.name}</h3>
                    </div>
                    ${isLocked 
                        ? `<button class="watch-btn locked-btn">🔒 UPGRADE TO UNLOCK</button>` 
                        : `<a href="${course.url}" target="_blank" class="watch-btn">WATCH NOW</a>`
                    }
                `;
                grid.appendChild(box);
            });
        }
    </script>
</body>
</html>
