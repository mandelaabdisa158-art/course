<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X_Marsh | Pro Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #ff0055; --secondary: #7000ff; --bg: #050505; --card-bg: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg); background-image: radial-gradient(circle at 20% 30%, #1a0b2e 0%, #050505 100%); color: white; min-height: 100vh; }
        
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-size: 1.8rem; font-weight: 800; color: var(--primary); cursor: pointer; letter-spacing: 2px; }
        .user-section { display: flex; align-items: center; gap: 15px; }

        .page { display: flex; flex-direction: column; align-items: center; padding: 60px 20px; }
        h1 { font-size: 3rem; text-transform: uppercase; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; text-align: center; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; width: 100%; max-width: 1200px; margin-top: 40px; }
        .box { background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 35px; text-align: center; backdrop-filter: blur(10px); transition: 0.4s; display: flex; flex-direction: column; justify-content: space-between; }
        .module-label { color: var(--primary); font-weight: 800; font-size: 0.75rem; letter-spacing: 3px; }
        h3 { margin: 15px 0; font-size: 1.4rem; min-height: 50px; }
        
        .watch-btn, .login-btn { display: inline-block; padding: 14px 25px; width: 100%; background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; text-decoration: none; transition: 0.3s; text-align: center; }
        .watch-btn:hover { filter: brightness(1.2); transform: translateY(-2px); }
        .locked { background: #222; border: 1px solid #444; cursor: not-allowed; opacity: 0.7; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">X_Marsh</div>
        <div class="user-section">
            <button id="auth-btn" class="login-btn" style="margin:0; width: auto; padding: 8px 15px;" onclick="handleAuth()">Login</button>
        </div>
    </nav>

    <section id="main-page" class="page">
        <h1 id="welcome-text">Course Dashboard</h1>
        <p id="status-label" style="margin-bottom: 20px; color: #ff0055; font-weight: 600;">Please Login to Access Courses</p>
        <div class="grid" id="courseGrid"></div>
    </section>

    <script>
        // Your specific Supabase credentials
        const SUPABASE_URL = 'https://vndrvffgpzxffufuljbi.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZuZHJ2ZmZncHp4ZmZ1ZnVsamJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MDI3MzAsImV4cCI6MjA5MTA3ODczMH0.Dbs7eb5vdDygs-QsG_Y_-KRQxlLWTe3_t42hdGcLKTY';

        // Initialize the Supabase client
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const courses = [
            { name: "Intro to Capcut", url: "https://youtu.be/SZPswpuvyl4" },
            { name: "Green Screen Secrets", url: "https://youtu.be/w-742mxKkNU" },
            { name: "Pro Editing (Premium)", url: "https://youtu.be/locked1" },
            { name: "Viral Growth (Premium)", url: "https://youtu.be/locked2" }
        ];

        async function handleAuth() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                await supabaseClient.auth.signOut();
                location.reload();
            } else {
                const email = prompt("Enter your email to get a login link:");
                if (!email) return;
                const { error } = await supabaseClient.auth.signInWithOtp({ email });
                if (error) alert("Error: " + error.message);
                else alert("Success! Check your email inbox for the magic login link.");
            }
        }

        async function checkUser() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const authBtn = document.getElementById('auth-btn');
            
            if (user) {
                authBtn.innerText = "Logout";
                
                // Checks the 'profiles' table for premium status
                let { data: profile, error } = await supabaseClient.from('profiles').select('*').eq('id', user.id).single();
                
                if (!profile) {
                    // Creates a new profile if it's the user's first time
                    await supabaseClient.from('profiles').insert([{ id: user.id, email: user.email, is_premium: false }]);
                    render(false);
                } else {
                    render(profile.is_premium);
                }
            } else {
                authBtn.innerText = "Login";
                render(false);
            }
        }

        function render(isPremium) {
            const grid = document.getElementById('courseGrid');
            const statusLabel = document.getElementById('status-label');
            
            statusLabel.innerText = isPremium ? "💎 PREMIUM ACTIVE" : "🆓 FREE MEMBER (Login for status)";
            
            grid.innerHTML = courses.map((c, i) => {
                const locked = i >= 2 && !isPremium;
                return `
                    <div class="box">
                        <div class="module-label">${locked ? 'LOCKED' : 'MODULE 0' + (i + 1)}</div>
                        <h3>${locked ? "Premium Access Required" : c.name}</h3>
                        ${locked 
                            ? `<div class="watch-btn locked">PAY TO UNLOCK</div>` 
                            : `<a href="${c.url}" target="_blank" class="watch-btn">WATCH NOW</a>`
                        }
                    </div>
                `;
            }).join('');
        }

        checkUser();
    </script>
</body>
</html>
