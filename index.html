<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X_Marsh | Multi-Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff0055; --secondary: #7000ff; --bg: #050505; --card-bg: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg); background-image: radial-gradient(circle at 20% 30%, #1a0b2e 0%, #050505 100%); color: white; min-height: 100vh; overflow-x: hidden; }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo { font-size: 1.8rem; font-weight: 800; color: var(--primary); cursor: pointer; letter-spacing: 2px; }
        
        .nav-links { display: flex; gap: 15px; align-items: center; }
        .nav-links a { color: #ccc; text-decoration: none; font-size: 0.9rem; font-weight: 600; transition: 0.3s; }
        .nav-links a:hover { color: var(--primary); }

        .page { display: flex; flex-direction: column; align-items: center; padding: 40px 20px; text-align: center; }
        h1 { font-size: 2.8rem; text-transform: uppercase; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; animation: fadeInUp 0.8s ease-out; }

        .status-pill { background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 50px; font-size: 0.8rem; border: 1px solid var(--primary); margin-bottom: 20px; display: inline-block; }

        .category-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; width: 100%; max-width: 1100px; margin-top: 30px; }
        .cat-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); padding: 40px 20px; border-radius: 20px; cursor: pointer; transition: 0.4s; animation: fadeInUp 0.8s ease-out both; }
        .cat-card:hover { border-color: var(--primary); transform: translateY(-8px); background: rgba(255, 0, 85, 0.1); box-shadow: 0 15px 30px rgba(255, 0, 85, 0.2); }

        /* Modals */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); }
        .modal-content { background: #111; margin: 10% auto; padding: 30px; border: 1px solid var(--primary); border-radius: 24px; width: 90%; max-width: 450px; text-align: center; box-shadow: 0 0 50px rgba(255,0,85,0.2); }
        .modal input { width: 100%; padding: 15px; margin: 20px 0; border: 1px solid #333; border-radius: 12px; background: #000; color: white; font-size: 1rem; text-align: center; }

        .watch-btn { display: inline-block; padding: 14px 25px; width: 100%; background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; text-decoration: none; margin-top: 10px; transition: 0.3s; }
        .watch-btn:hover { transform: scale(1.02); filter: brightness(1.1); }

        .upgrade-banner { background: linear-gradient(90deg, #111, #222); border: 1px solid gold; padding: 20px; border-radius: 15px; margin-top: 30px; max-width: 600px; display: none; }
        
        .tg-link { color: #0088cc; font-weight: bold; text-decoration: none; display: block; margin-top: 15px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 1200px; margin-top: 30px; }
        .box { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 30px; text-align: left; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo" onclick="showHome()">X_MARSH</div>
        <div class="nav-links">
            <a href="#" onclick="showAbout()">About</a>
            <a href="https://t.me/T4t4t2" target="_blank">Support</a>
        </div>
    </nav>

    <section class="page">
        <h1 id="main-title">X_Marsh Academy</h1>
        <div id="status-pill-container"></div>
        <div id="content-area"></div>
    </section>

    <div id="code-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-heading">Access Code</h2>
            <p>Don't have a code? Message <a href="https://t.me/T4t4t2" target="_blank" class="tg-link">@T4t4t2</a></p>
            <input type="text" id="code-input" placeholder="Paste Code Here">
            <button class="watch-btn" onclick="validateCode()">UNLOCK NOW</button>
            <button style="background:none; border:none; color:#555; margin-top:15px; cursor:pointer;" onclick="closeModal()">Close</button>
        </div>
    </div>

    <div id="surprise-modal" class="modal">
        <div class="modal-content">
            <h2>🎉 Access Granted!</h2>
            <p>One quick question: What do you love most?</p>
            <div style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin:20px 0;">
                <button onclick="finishLogin('⚽')" style="padding:10px; cursor:pointer;">Football</button>
                <button onclick="finishLogin('🌹')" style="padding:10px; cursor:pointer;">Rose</button>
                <button onclick="finishLogin('🚗')" style="padding:10px; cursor:pointer;">Cars</button>
                <button onclick="finishLogin('🎮')" style="padding:10px; cursor:pointer;">Gaming</button>
            </div>
            <div id="emoji-result" style="font-size:3rem;"></div>
        </div>
    </div>

    <script>
        // EXPANDED PASSCODES
        const trialCodes = ['djhd37', 'djhd36', 'djhd35', 'djhd34', 'djhd33', 'djhd32', 'djhd31', 'djhd30', 'xm-trial-01', 'xm-trial-02', 'xm-trial-03', 'xm-trial-04', 'xm-trial-05', 'xm-trial-06', 'xm-trial-07', 'xm-trial-08', 'xm-trial-09', 'xm-trial-10'];
        const premiumCodes = ['djfhd37', 'djhgd36', 'djhyd35', 'djhtd34', 'djhrd33', 'djhsd32', 'djkhd31', 'djihd30', 'xm-prem-v01', 'xm-prem-v02', 'xm-prem-v03', 'xm-prem-v04', 'xm-prem-v05', 'xm-prem-v06', 'xm-prem-v07', 'xm-prem-v08', 'xm-prem-v09', 'xm-prem-v10'];

        const courseData = {
            editing: { title: "Video Editing", videos: [{name: "Intro", url:"#"}, {name: "Effects", url:"#"}, {name: "Mastery (P)", url:"#"}] },
            trading: { title: "Trading Strategy", videos: [{name: "Basics", url:"#"}, {name: "Analysis", url:"#"}, {name: "Pro Secrets (P)", url:"#"}] },
            ai: { title: "AI Mastery", videos: [{name: "Prompts", url:"#"}, {name: "Tools", url:"#"}, {name: "Automation (P)", url:"#"}] },
            youtube: { title: "YT Automation", videos: [{name: "Niches", url:"#"}, {name: "Scripts", url:"#"}, {name: "Growth (P)", url:"#"}] },
            canva: { title: "Canva Pro", videos: [{name: "Design 101", url:"#"}, {name: "Elements", url:"#"}, {name: "Branding (P)", url:"#"}] }
        };

        function showHome() {
            const userType = localStorage.getItem('marsh_user_type');
            const pill = document.getElementById('status-pill-container');
            pill.innerHTML = userType ? `<div class="status-pill">${userType.toUpperCase()} ACCESS</div>` : "";
            
            document.getElementById('main-title').innerText = "X_Marsh Academy";
            const area = document.getElementById('content-area');
            area.innerHTML = `
                <div class="category-grid">
                    <div class="cat-card" onclick="handleEntry('editing')"><h2>EDITING</h2></div>
                    <div class="cat-card" onclick="handleEntry('trading')"><h2>TRADING</h2></div>
                    <div class="cat-card" onclick="handleEntry('ai')"><h2>AI COURSE</h2></div>
                    <div class="cat-card" onclick="handleEntry('youtube')"><h2>YOUTUBE</h2></div>
                    <div class="cat-card" onclick="handleEntry('canva')"><h2>CANVA</h2></div>
                </div>
                ${userType === 'trial' ? `
                    <div class="upgrade-banner" style="display:block; margin: 40px auto;">
                        <h3 style="color:gold;">🌟 Upgrade to Premium</h3>
                        <p>Unlock ALL videos for just <b>999 ETB</b></p>
                        <button class="watch-btn" style="background:gold; color:black; width:auto; padding:10px 30px;" onclick="openUpgrade()">ENTER PREMIUM CODE</button>
                    </div>
                ` : ""}
            `;
        }

        function handleEntry(key) {
            window.currentCourseKey = key;
            const type = localStorage.getItem('marsh_user_type');
            if(type) showCourse(key, type);
            else document.getElementById('code-modal').style.display = 'block';
        }

        function openUpgrade() {
            document.getElementById('modal-heading').innerText = "Upgrade to Premium";
            document.getElementById('code-modal').style.display = 'block';
        }

        function validateCode() {
            const code = document.getElementById('code-input').value.trim().toLowerCase();
            const used = JSON.parse(localStorage.getItem('used_codes') || '[]');

            if(used.includes(code)) { alert("Code already used!"); return; }

            let type = "";
            if(premiumCodes.includes(code)) type = "premium";
            else if(trialCodes.includes(code)) type = "trial";
            else { alert("Invalid Code!"); return; }

            localStorage.setItem('marsh_user_type', type);
            used.push(code);
            localStorage.setItem('used_codes', JSON.stringify(used));
            
            document.getElementById('code-modal').style.display = 'none';
            document.getElementById('surprise-modal').style.display = 'block';
        }

        function finishLogin(emoji) {
            document.getElementById('emoji-result').innerText = emoji;
            setTimeout(() => {
                document.getElementById('surprise-modal').style.display = 'none';
                showHome();
            }, 1000);
        }

        function showCourse(key, type) {
            const course = courseData[key];
            const isPrem = type === 'premium';
            const vids = isPrem ? course.videos : course.videos.slice(0, 2);

            document.getElementById('main-title').innerText = course.title;
            const area = document.getElementById('content-area');
            let html = `<button class="watch-btn" style="width:auto; background:#333;" onclick="showHome()">⬅ Back</button> <div class="grid">`;
            
            vids.forEach((v, i) => {
                html += `<div class="box"><h4>Module 0${i+1}</h4><h3>${v.name}</h3><a href="${v.url}" class="watch-btn">WATCH</a></div>`;
            });

            if(!isPrem) {
                html += `<div class="box" style="border: 2px dashed #444; opacity:0.6;"><h4>🔒 LOCKED</h4><h3>Premium Lesson</h3><button class="watch-btn" onclick="openUpgrade()">UPGRADE (999 ETB)</button></div>`;
            }
            area.innerHTML = html + `</div>`;
        }

        function showAbout() {
            const area = document.getElementById('content-area');
            area.innerHTML = `<div style="max-width:600px; margin:auto; background:var(--card-bg); padding:40px; border-radius:20px;">
                <h2>About X_Marsh</h2>
                <p>Ethiopia's leading digital skill academy. We help you master the creator economy.</p>
                <p style="margin-top:20px;">Contact CEO: <a href="https://t.me/T4t4t2" class="tg-link">@T4t4t2</a></p>
                <button class="watch-btn" onclick="showHome()">Back Home</button>
            </div>`;
        }

        function closeModal() { document.getElementById('code-modal').style.display = 'none'; }
        showHome();
    </script>
</body>
</html>
